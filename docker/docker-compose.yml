services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ainews
      POSTGRES_PASSWORD: ainews
      POSTGRES_DB: ainews
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainews"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db

  web:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://ainews:ainews@db:5432/ainews
    command: >
      sh -c "pip install uv --quiet &&
             uv sync --quiet &&
             uv run uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
